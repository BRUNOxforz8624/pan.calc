<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#bc6c25">
  <meta name="description" content="Control de producción semanal para panadería">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <title>PanCalc</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🥖 PanCalc</h1>
      <div class="header-right">
        <span id="current-date"></span>
        <button id="btn-manage" class="gear-btn">⚙️</button>
        <button id="btn-print" class="gear-btn">🖨️</button>
      </div>
    </header>

    <div id="tab-bar">
      <button class="tab active" data-tab="today">Hoy</button>
      <button class="tab" data-tab="week">Calendario</button>
      <button class="tab" data-tab="report">Reporte</button>
      <button class="tab" data-tab="production">Producción</button>
    </div>

    <!-- ====== TAB HOY ====== -->
    <div id="view-today" class="view active">
      <div class="day-header">
        <span id="today-day"></span>
        <div class="today-circular-progress">
          <svg viewBox="0 0 36 36">
            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path id="today-circle-progress" class="circle-fill" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <text x="18" y="20.5" class="circle-text" id="today-pct-text">0%</text>
          </svg>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar producto...">
      </div>

      <div id="today-product-list" class="product-list"></div>
    </div>

    <!-- ====== TAB CALENDARIO ====== -->
    <div id="view-week" class="view">
      <div class="cal-picker-row">
        <button id="cal-prev-day" class="cal-arrow-btn">‹</button>
        <input type="date" id="cal-date-picker" class="cal-date-input">
        <button id="cal-next-day" class="cal-arrow-btn">›</button>
      </div>
      <div id="cal-detail" class="cal-detail">
        <div class="cal-detail-header" id="cal-detail-header"></div>
        <div id="cal-detail-body"></div>
        <div class="cal-orders-section" id="cal-orders-section">
          <div class="cal-orders-title">📦 Pedidos del día</div>
          <div id="cal-orders-list"></div>
          <button id="cal-add-order-btn" class="cal-add-order-btn">+ Añadir pedido</button>
        </div>
      </div>
    </div>

    <!-- ====== TAB REPORTE ====== -->
    <div id="view-report" class="view">
      <div class="report-header">
        <div class="report-date" id="report-date"></div>
      </div>

      <div class="report-subtabs">
        <button class="subtab active" data-subtab="report-prod">Elaboración</button>
        <button class="subtab" data-subtab="report-final">Final</button>
      </div>

      <!-- Subvista: Producción -->
      <div id="report-prod" class="report-subview active">
        <div class="report-title">Producción del día</div>
        <div class="report-stats">
          <div class="report-stat">
            <span class="report-stat-value" id="report-total-target">0</span>
            <span class="report-stat-label">Meta total</span>
          </div>
          <div class="report-stat">
            <span class="report-stat-value" id="report-total-produced">0</span>
            <span class="report-stat-label">Producido</span>
          </div>
          <div class="report-stat">
            <span class="report-stat-value" id="report-total-missing">0</span>
            <span class="report-stat-label">Faltan</span>
          </div>
        </div>
        <div id="report-product-list" class="report-list"></div>
      </div>

      <!-- Subvista: Final -->
      <div id="report-final" class="report-subview">
        <div class="report-title">Reporte Final</div>
        <div class="report-stats">
          <div class="report-stat">
            <span class="report-stat-value" id="final-total-tandas">0</span>
            <span class="report-stat-label">Total tandas</span>
          </div>
          <div class="report-stat">
            <span class="report-stat-value" id="final-total-mermas">0</span>
            <span class="report-stat-label">Mermas</span>
          </div>
          <div class="report-stat">
            <span class="report-stat-value" id="final-total-neto">0</span>
            <span class="report-stat-label">Neto</span>
          </div>
        </div>
        <div id="report-final-list" class="report-list"></div>
      </div>
    </div>

    <!-- ====== TAB PRODUCCIÓN ====== -->
    <div id="view-production" class="view">
      <div class="prod-header">
        <span class="prod-title">Tandas del día</span>
        <span class="prod-header-date" id="prod-date"></span>
        <button class="prod-reset-btn" onclick="resetAllData()">✕</button>
      </div>
      <div id="prod-product-list" class="product-list"></div>
    </div>

    <!-- ====== MODAL GESTIÓN PRODUCTOS ====== -->
    <div id="manage-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Gestionar Productos</h3>
          <button id="manage-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body" style="padding-bottom: 60px">
          <button id="manage-add-btn" class="manage-add-btn">+ Añadir producto</button>
          <div id="manage-list" class="manage-list"></div>
        </div>
      </div>
    </div>

    <!-- ====== MODAL DÍA ====== -->
    <div id="day-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="day-modal-header"></h3>
          <button id="day-modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body" id="day-modal-body"></div>
      </div>
    </div>

    <!-- ====== MODAL TANDAS ====== -->
    <div id="tanda-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="tanda-product-name"></h3>
          <button id="tanda-modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="tanda-list" id="tanda-list"></div>
          <div class="tanda-summary">
            <div class="tanda-total-row">
              <span>Total tandas:</span>
              <strong id="tanda-total">0</strong>
            </div>
            <div class="tanda-mermas-row">
              <span>Mermas (quemados/dañados):</span>
              <input type="number" id="tanda-mermas-input" min="0" value="0" inputmode="numeric">
            </div>
            <div class="tanda-neto-row">
              <span>Neto:</span>
              <strong id="tanda-neto">0</strong>
            </div>
          </div>
          <button class="tanda-save-btn" onclick="saveTandas()">Guardar</button>
        </div>
      </div>
    </div>

    <!-- ====== MODAL PRODUCTO ====== -->
    <div id="product-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-product-name"></h3>
          <button id="modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-target">
            <span>Meta:</span>
            <strong id="modal-target-value"></strong>
          </div>
          <div class="modal-counter">
            <span class="modal-count" id="modal-count">0</span>
            <span class="modal-count-label">producidos</span>
          </div>
          <div class="modal-remaining" id="modal-remaining">Faltan: 0</div>
          <div class="modal-progress">
            <div class="modal-progress-bar" id="modal-progress-bar"></div>
          </div>
          <div class="modal-set-row">
            <label>Escribe los que llevas:</label>
            <div class="modal-set-input-group">
              <input type="number" id="modal-set-input" min="0" step="1" inputmode="numeric">
              <button id="modal-set-btn" onclick="modalSetValue()">Fijar</button>
            </div>
          </div>
          <div class="modal-actions">
            <button class="modal-btn" onclick="modalAdd(1)">+1</button>
            <button class="modal-btn" onclick="modalAdd(5)">+5</button>
            <button class="modal-btn" onclick="modalAdd(10)">+10</button>
            <button class="modal-btn modal-btn-minus" onclick="modalAdd(-1)">-1</button>
          </div>
        </div>
      </div>
    </div>
    <!-- ====== MODAL PEDIDO ====== -->
    <div id="order-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Añadir pedido</h3>
          <button id="order-modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <label class="order-label">Fecha</label>
          <input type="date" id="order-date" class="order-input">
          <label class="order-label">Producto</label>
          <select id="order-product" class="order-select"></select>
          <label class="order-label">Cantidad</label>
          <input type="number" id="order-qty" class="order-input" min="1" inputmode="numeric">
          <label class="order-label">Hora de entrega</label>
          <input type="time" id="order-time" class="order-input">
          <div class="order-btn-row">
            <button id="order-save-btn" class="order-save-btn">Guardar pedido</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ====== MODAL IMPRIMIR ====== -->
    <div id="print-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content" style="max-width:320px;margin:auto;border-radius:20px">
        <div class="modal-header">
          <h3>Imprimir reporte</h3>
          <button id="print-modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:10px">
          <button class="print-option-btn" onclick="printReport('elaboracion')">📋 Reporte Elaboración</button>
          <button class="print-option-btn" onclick="printReport('final')">📊 Reporte Final</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
